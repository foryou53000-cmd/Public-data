<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경북 체험학습 추천</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --b50:#EFF6FF;--b100:#DBEAFE;--b200:#BFDBFE;--b300:#93C5FD;
  --b400:#60A5FA;--b500:#3B82F6;--b600:#2563EB;--b700:#1D4ED8;--b800:#1E40AF;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;--g800:#1E293B;--g900:#0F172A;
  --bg:#f4f1eb;--green:#1b4332;--green2:#2d6a4f;--mint:#22c55e;--orange:#f4a261;--orange2:#e76f51;--soft:#f8fafc;--shadow:0 10px 30px rgba(0,0,0,.08);
  --lw:320px;--rw:390px;--th:58px;--shell:1120px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--g900);}
body{margin:0;overflow:auto;}
button,input,select{font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* ── 레이아웃 ── */
#app{position:relative;background:var(--bg);}
#app.intro{display:block;min-height:100vh;}
#app.intro #rgt{display:none;}
#app.intro #mapw{display:none;}
#app.intro #lft{position:relative;width:min(var(--shell),calc(100% - 32px));max-width:none;max-height:none;margin:-18px auto 24px;border:none;border-radius:20px;box-shadow:var(--shadow);}
#app.intro .me{display:none;}
#app.results{height:100vh;overflow:hidden;display:grid;grid-template-rows:var(--th) 1fr;grid-template-columns:1fr;grid-template-areas:"top" "map";}
#app.results #mapw{position:absolute;inset:0;z-index:1;width:100%;height:100%;overflow:hidden;}
#app.results #map{height:100vh;min-height:0;}
#app.results .leaflet-top{top:var(--th);}
#app.results #lft{display:none;}

/* ── 탑바 / 히어로 ── */
#top{grid-area:top;background:var(--green);color:#fff;display:flex;align-items:center;padding:0 16px;gap:14px;z-index:100;}
#app.intro #top{min-height:178px;background:linear-gradient(135deg,var(--green),var(--green2));align-items:flex-start;padding:28px 20px 40px;}
#app.intro #top .brand{width:min(var(--shell),100%);margin:0 auto;align-items:flex-start;}
#app.intro .top-r{display:none;}
#app.results #top{height:var(--th);box-shadow:0 2px 12px rgba(15,23,42,.18);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-ic{width:32px;height:32px;background:rgba(255,255,255,.14);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.brand-tx{font-size:15px;font-weight:800;color:inherit;letter-spacing:-.3px;}
.brand-sb{font-size:11px;color:rgba(255,255,255,.76);margin-top:1px;}
#app.intro .brand-ic{width:42px;height:42px;border-radius:12px;font-size:22px;background:rgba(255,255,255,.16);}
#app.intro .brand-tx{font-size:30px;font-weight:900;line-height:1.18;letter-spacing:0;}
#app.intro .brand-sb{font-size:13px;margin-top:10px;line-height:1.7;color:rgba(255,255,255,.84);}
.top-r{margin-left:auto;display:flex;gap:6px;}
.tbadge{font-size:11px;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.22);padding:3px 10px;border-radius:20px;font-weight:600;}
.result-only{display:none;}
#app.results .intro-only{display:none;}
#app.results .result-only{display:inline-flex;}
.topBtn{border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:800;align-items:center;gap:4px;}
.topBtn:hover{background:rgba(255,255,255,.24);}

/* ── 지도 위 검색 패널 ── */
#lft{grid-area:map;align-self:start;justify-self:start;width:var(--lw);max-width:calc(100% - 28px);max-height:calc(100% - 28px);margin:14px;background:#fff;border:1px solid var(--g200);border-radius:12px;box-shadow:0 12px 36px rgba(15,23,42,.14);display:flex;flex-direction:column;overflow:hidden;z-index:450;transition:width .22s ease,box-shadow .22s ease;}
.lbody{flex:1;overflow-y:auto;padding:20px;}
.lbody::-webkit-scrollbar{width:3px;}
.lbody::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}
.lfoot{padding:12px 16px;border-top:1px solid var(--g100);}
.foot-actions{display:grid;grid-template-columns:minmax(0,1fr) 80px;gap:8px;align-items:stretch;}

.sec{margin-bottom:20px;}
.slbl{font-size:15px;font-weight:800;color:var(--green);letter-spacing:0;text-transform:none;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--g100);}

input[type=text]{width:100%;padding:14px 12px;border:1px solid #d1d5db;border-radius:12px;font-size:14px;outline:none;background:#fff;color:var(--g800);transition:all .15s;}
input[type=text]:focus{border-color:var(--b400);background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.08);}
input::placeholder{color:var(--g300);}
.srow{display:flex;gap:6px;}
.srow input{flex:1;}
.sbtn{padding:0 16px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:13px;font-weight:800;transition:background .15s;flex-shrink:0;}
.sbtn:hover{background:var(--green2);}
.sbtn:disabled{background:var(--g300);}

#dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--g200);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:500;max-height:240px;overflow-y:auto;display:none;}
.ddi{width:100%;padding:9px 12px;border:none;background:transparent;text-align:left;cursor:pointer;border-bottom:1px solid var(--g100);display:flex;flex-direction:column;gap:2px;transition:background .1s;}
.ddi:last-child{border-bottom:none;}
.ddi:hover{background:var(--b50);}
.dn{font-size:13px;font-weight:600;color:var(--g800);}
.ds{font-size:11px;color:var(--g400);}

.st-ok{margin-top:6px;padding:7px 10px;background:var(--b50);border:1px solid var(--b200);border-radius:7px;font-size:12px;color:var(--b700);display:flex;align-items:center;justify-content:space-between;}
.st-err{margin-top:6px;padding:7px 10px;background:#FEF2F2;border:1px solid #FECACA;border-radius:7px;font-size:12px;color:#DC2626;}
.st-inf{margin-top:6px;padding:7px 10px;background:var(--g50);border:1px solid var(--g200);border-radius:7px;font-size:12px;color:var(--g500);}
.xb{border:none;background:none;color:var(--g400);font-size:12px;padding:0;cursor:pointer;}

.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:9px 18px;border:1px solid #86efac;border-radius:999px;font-size:13px;font-weight:800;cursor:pointer;background:#fff;color:#166534;transition:all .15s;}
.chip.on{background:var(--mint);color:#fff;border-color:var(--mint);}
.chip:hover:not(.on){background:#f0fdf4;border-color:var(--mint);color:#166534;}

.ubt{width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:14px;background:#fff;text-align:left;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.ubt:hover{border-color:var(--mint);background:#f0fdf4;}
.ubt.on{background:#f0fdf4;color:var(--g900);border-color:var(--mint);}
.ubt .ic{font-size:17px;flex-shrink:0;margin-top:1px;}
.ubt .nm{font-size:13px;font-weight:700;}
.ubt .tm{font-size:11px;opacity:.6;margin-top:3px;line-height:1.4;}
.source-note{margin-top:4px;padding:12px;border-radius:12px;background:#f8fafc;color:#64748b;font-size:12px;line-height:1.65;border:1px solid #e5e7eb;}

.goBtn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;font-size:16px;font-weight:900;transition:all .15s;}
.goBtn:hover:not(:disabled){filter:brightness(.96);}
.goBtn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed;}
.resetBtn{border:1px solid var(--g200);border-radius:9px;background:#fff;color:var(--g600);font-size:13px;font-weight:700;transition:all .15s;}
.resetBtn:hover:not(:disabled){border-color:var(--b300);background:var(--b50);color:var(--b700);}
.resetBtn:disabled{color:var(--g300);background:var(--g50);cursor:not-allowed;}

/* ── 지도 ── */
#mapw{grid-area:map;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
.me{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--g50);color:var(--g400);pointer-events:none;transition:opacity .3s;z-index:1;}
.me.hide{opacity:0;pointer-events:none;}
.me-ic{font-size:44px;}
.me-t{font-size:14px;font-weight:600;color:var(--g400);}
.me-s{font-size:12px;color:var(--g300);text-align:center;line-height:1.6;}

/* ── 오른쪽 추천 장소 ── */
#rgt{grid-area:rgt;background:#fff;border-left:1px solid var(--g200);display:flex;flex-direction:column;overflow:hidden;}
#app.results #rgt{position:absolute;top:calc(var(--th) + 16px);right:16px;bottom:16px;width:min(var(--rw),calc(100vw - 32px));border:none;border-radius:20px;box-shadow:0 18px 48px rgba(15,23,42,.22);z-index:30;}

.rhead{padding:16px 16px 0;flex-shrink:0;}
.rhead-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rhead-title{font-size:15px;font-weight:900;color:var(--green);}
.rhead-cnt{font-size:11px;color:var(--g400);}

/* 대분류 탭 */
.ctabs{display:flex;gap:4px;overflow-x:auto;padding:0 0 10px 0;flex-shrink:0;}
.ctabs::-webkit-scrollbar{height:3px;}
.ctabs::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}
.ctab{padding:6px 12px;border:1px solid var(--g200);border-radius:20px;font-size:12px;font-weight:600;color:var(--g500);background:var(--g50);white-space:nowrap;flex-shrink:0;transition:all .15s;}
.ctab.on{background:var(--b600);color:#fff;border-color:var(--b600);}
.ctab:hover:not(.on){background:var(--b50);border-color:var(--b300);color:var(--b700);}

/* 소분류 */
.sbar{padding:0 14px 10px;display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--g100);flex-shrink:0;}
.sbar::-webkit-scrollbar{height:3px;}
.sbar::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}
.sch{padding:5px 11px;border:1px solid var(--g200);border-radius:20px;font-size:12px;font-weight:500;color:var(--g500);background:#fff;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.sch.on{background:var(--b100);color:var(--b700);border-color:var(--b300);}
.sch:hover:not(.on){background:var(--g50);}

/* 정렬 */
.sortbar{padding:8px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--g100);flex-shrink:0;}
.sortlbl{font-size:12px;color:var(--g400);font-weight:500;}
.sortbtn{padding:4px 11px;border:1px solid var(--g200);border-radius:20px;font-size:12px;font-weight:500;color:var(--g500);background:#fff;transition:all .15s;}
.sortbtn.on{background:var(--g800);color:#fff;border-color:var(--g800);}

/* 장소 리스트 */
#rlist{flex:1;overflow-y:auto;padding:10px 10px 16px;}
#rlist::-webkit-scrollbar{width:3px;}
#rlist::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}

/* 장소 리스트 카드 */
.pc{border-radius:9px;border:1px solid var(--g100);margin-bottom:7px;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .15s;background:#fff;display:grid;grid-template-columns:32px minmax(0,1fr);gap:10px;padding:10px 11px;}
.pc:hover{box-shadow:0 4px 12px rgba(59,130,246,.1);border-color:var(--b200);transform:translateY(-1px);}
.pc-ico{width:32px;height:32px;border-radius:8px;background:var(--b50);color:var(--b700);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;line-height:1;}
.pc-img{width:100%;height:110px;object-fit:cover;display:block;background:var(--g100);}
.pc-nimg{width:100%;height:110px;background:linear-gradient(135deg,var(--b50),var(--g100));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.pc-nimg-ic{font-size:26px;opacity:.35;}
.pc-nimg-tx{font-size:11px;color:var(--g400);font-weight:500;}
.pc-body{padding:0;min-width:0;}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:4px;}
.pc-nm{font-size:13px;font-weight:700;color:var(--g800);line-height:1.35;flex:1;min-width:0;}
.votes{display:flex;gap:3px;flex-shrink:0;}
.vb{display:flex;align-items:center;gap:2px;padding:3px 7px;border-radius:20px;border:1px solid var(--g200);font-size:11px;font-weight:600;color:var(--g500);background:#fff;transition:all .15s;}
.vb:hover{border-color:var(--b300);}
.vb.up.on{background:var(--b50);color:var(--b600);border-color:var(--b300);}
.vb.dn.on{background:#FEF2F2;color:#DC2626;border-color:#FECACA;}
.pc-addr{font-size:11px;color:var(--g400);margin-bottom:6px;line-height:1.45;}
.pc-tags{display:flex;gap:3px;flex-wrap:wrap;}
.ptag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.pb{background:var(--b50);color:var(--b600);}
.pg{background:var(--g100);color:var(--g500);}

/* 빈 / 스켈레톤 */
.rempty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--g300);text-align:center;gap:8px;}
.rempty-ic{font-size:36px;}
.rempty-t{font-size:13px;font-weight:600;color:var(--g400);}
.rempty-s{font-size:12px;color:var(--g300);line-height:1.5;}
.sk-card{border-radius:9px;border:1px solid var(--g100);overflow:hidden;margin-bottom:7px;padding:10px 11px;}
.sk{background:linear-gradient(90deg,var(--g100),var(--g50),var(--g100));background-size:200% 100%;animation:sk 1.5s ease-in-out infinite;}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-h{height:14px;width:74%;border-radius:4px;margin-bottom:8px;}
.sk-b{padding:0;}
.sk-l{height:12px;border-radius:4px;margin-bottom:7px;}

/* 모달 */
#ov{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
#ov.on{display:flex;}
#mod{background:#fff;border-radius:16px;width:100%;max-width:720px;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden;}
#mhd{padding:16px 18px;background:var(--b600);color:#fff;display:flex;align-items:flex-start;gap:10px;flex-shrink:0;}
#mttl{font-size:16px;font-weight:800;flex:1;line-height:1.35;}
#mcls{border:none;background:rgba(255,255,255,.2);color:#fff;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;flex-shrink:0;}
#mbdy{overflow-y:auto;flex:1;}
#mbdy::-webkit-scrollbar{width:4px;}
#mbdy::-webkit-scrollbar-thumb{background:var(--g200);border-radius:4px;}
.mimg{width:100%;height:200px;object-fit:cover;display:block;}
.mnimg{width:100%;height:150px;background:linear-gradient(135deg,var(--b50),var(--g100));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.mnimg-ic{font-size:40px;opacity:.3;}
.mnimg-tx{font-size:12px;color:var(--g400);}
.minfo{padding:16px 18px 20px;}
.ib{padding:13px 15px;border-radius:9px;margin-bottom:9px;font-size:13px;line-height:1.9;}
.ibl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;color:var(--g500);}
.nlink{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--b600);font-weight:600;text-decoration:none;margin-top:4px;}
.nlink:hover{text-decoration:underline;}
.m-actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 9px;}
.mact{border:1px solid var(--g200);background:#fff;color:var(--g600);border-radius:8px;padding:9px 12px;font-size:12px;font-weight:700;transition:all .15s;}
.mact:hover{border-color:var(--b300);background:var(--b50);color:var(--b700);}
.mact.primary{background:var(--g900);border-color:var(--g900);color:#fff;}
.mact.primary:hover{background:var(--b700);border-color:var(--b700);color:#fff;}
/* AI 섹션 */
.ai-box{padding:14px 16px;border-radius:10px;margin-bottom:9px;background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border:1px solid var(--b200);}
.ai-hd{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.ai-ic{font-size:16px;}
.ai-ttl{font-size:12px;font-weight:700;color:var(--b700);}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.ai-chip{background:#fff;border:1px solid var(--b100);border-radius:8px;padding:9px 10px;font-size:12px;line-height:1.55;color:var(--g700);}
.ai-chip strong{display:block;font-size:11px;color:var(--b700);margin-bottom:3px;}
.ai-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g400);}
.ai-spin{width:14px;height:14px;border:2px solid var(--b200);border-top-color:var(--b500);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-row{margin-bottom:8px;}
.ai-row-lbl{font-size:11px;font-weight:700;color:var(--b600);margin-bottom:4px;}
.ai-row-tx{font-size:13px;color:var(--g700);line-height:1.75;}
.ai-err{font-size:12px;color:#DC2626;}
.cardnews{margin:10px 0 9px;padding:12px;border:1px solid var(--g200);border-radius:12px;background:var(--g50);}
.cardnews[hidden]{display:none;}
.news-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.news-card{min-height:228px;border-radius:10px;border:1px solid var(--g200);background:#fff;overflow:hidden;display:flex;flex-direction:column;}
.news-photo{height:112px;background:linear-gradient(135deg,var(--b50),var(--g100));position:relative;overflow:hidden;}
.news-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.news-placeholder{height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--g300);}
.news-body{padding:12px;display:flex;flex-direction:column;gap:7px;flex:1;}
.news-kicker{font-size:10px;font-weight:800;color:var(--b600);letter-spacing:.5px;text-transform:uppercase;}
.news-title{font-size:15px;font-weight:800;color:var(--g900);line-height:1.35;}
.news-text{font-size:12px;color:var(--g600);line-height:1.65;}
.news-meta{margin-top:auto;font-size:11px;font-weight:700;color:var(--g500);line-height:1.45;}
/* 팝업 */
.leaflet-popup-content b{font-size:13px;font-weight:700;display:block;margin-bottom:3px;}
.leaflet-popup-content{font-size:12px;line-height:1.6;min-width:160px;}
@media (max-width:900px){
  body{padding:0;}
  #app{height:auto;}
  #app.results{height:100vh;}
  #app.intro #top{min-height:160px;padding:24px 16px 36px;}
  #app.intro #lft{width:calc(100% - 24px);margin:-18px 12px 24px;}
  #app.intro .top-r{display:none;}
  #app.results #top{padding:0 12px;}
  #app.results .top-r{display:flex;margin-left:auto;}
  #app.results .brand-sb{display:none;}
  #app.results #rgt{top:auto;left:12px;right:12px;bottom:12px;width:auto;height:42vh;border-radius:18px;}
  .ai-grid,.news-grid{grid-template-columns:1fr;}
  #mod{max-width:calc(100vw - 24px);}
}
</style>
</head>
<body>
<div id="app" class="intro">

<!-- 탑바 -->
<div id="top">
  <div class="brand">
    <div class="brand-ic">🌿</div>
    <div><div class="brand-tx">경북 체험학습 추천</div><div class="brand-sb">경상북도 교육과정 기반 플랫폼</div></div>
  </div>

  return {profile,score,min:profile.min,evidence,topic,direct:score>=profile.min,eras,blocked,missingEra};
}
function scorePlace(p,u,local){
  if(!isUsableTourPlace(p))return 0;
  if(u?.subtopics?.length){
    const rel=curriculumRelevance(p,u);
    if(rel.score<rel.min)return 0;
    const isNearby=p.dist<=8?18:p.dist<=15?12:p.dist<=30?6:0;
    let score=rel.score+isNearby;
    if(local?.code&&p.sigunguCode===local.code)score+=18;
    return score;
  }
  const title=(p.title||'').toLowerCase();
  const text=(p.title+' '+p.addr1+' '+p.cat+' '+p.sub).toLowerCase();
  const unitText=((u.name||'')+' '+(u.focus||'')+' '+(u.terms||[]).join(' ')+' '+(u.placeTypes||[]).join(' ')).toLowerCase();
  const termHits=(u.terms||[]).filter(k=>text.includes(k.toLowerCase())).length;
  const placeHits=(u.placeTypes||[]).filter(k=>text.includes(k.toLowerCase())).length;
  let score=termHits*22+placeHits*16;
  const isNearby=p.dist<=8?24:p.dist<=15?16:p.dist<=30?8:0;
  const historyCodes=['A02010700','A02010800','A02060100','A02060200','A02060300','A02060700'];
  const scienceCodes=['A02040800','A02060100','A02060300'];
  const natureCodes=['A01010100','A01010200','A01010400','A01010500','A01010600','A01010700','A01011800','A02020700'];
  if(/국가유산|박물관|기념관|유적|과거|역사|전통|생활 모습|민주화|평화|통일|독도|영토/.test(unitText)){
    if(historyCodes.includes(p.cat3))score+=18;
    if(/역사|문화관|박물관|기념관|향교|서원|고분|사찰|성곽|유적|사적|왕릉|종택|고택|호국|전쟁|평화|독도|울릉|근대|민속/.test(text))score+=30;
  }
  if(/지형|기후|자연|생태|환경|지도|위치|하천|해안|산지|대륙|대양/.test(unitText)){
    if(natureCodes.includes(p.cat3)||p.cat1==='A01')score+=18;
    if(/공원|생태|수목원|식물원|계곡|폭포|습지|지질|산|해안|호수|숲|강|하천|전망대|주상절리|울릉|독도/.test(text))score+=22;
  }
  if(/과학|날씨|지구|용해|천문/.test(unitText)){
    if(scienceCodes.includes(p.cat3))score+=16;
    if(/과학|천문|기상|자연사|체험관|박물관/.test(title))score+=22;
  }
  if(/경제|교류|생산|소비|산업화|시장|특산물/.test(unitText)&&/시장|산업|공장|공방|체험관|항구|역|특산|농촌|오일장|포항제철/.test(text))score+=28;
  if(/교통|통신/.test(unitText)&&/철도|역|항구|봉수|우체국|전신|교통|기차/.test(text))score+=30;
  if(/민주주의|선거|국가기관|주민|지역문제|인권|법/.test(unitText)&&/행정|시청|군청|의회|경찰|소방|안전|기념관|역사관|복지|평화|민주/.test(text))score+=24;
  if(/문화|세계|다문화|민속|축제|지역 알리기/.test(unitText)&&/문화|민속|축제|체험마을|세계|국제|박물관|시장/.test(text))score+=22;
  if(score===0&&termHits>0)score+=12;
  if(score>0)score+=isNearby;
  if(score>0&&local?.code&&p.sigunguCode===local.code)score+=35;
  return score;
}

function gv(id){return A.votes[id]||{up:0,dn:0,my:0};}
function vote(e,id,dir){
  e.stopPropagation();
  const v=gv(id);
  if(v.my===dir){if(dir===1)v.up=Math.max(0,v.up-1);else v.dn=Math.max(0,v.dn-1);v.my=0;}

  A.votes[id]=v;sv();rnList();
}

  if(/경제|교류|합리적 선택/.test(n)&&/시장|오일장|공방|체험장|항구|역|산업|특산/.test(text))score+=20;

function curriculumData(p,u,overview=''){

  return {
    unit:u.unit||`${order}단원`,
    topic:ref&&ref.name!==u.name?ref.name:'단원 전체',
    lesson:ref?.lesson||lessonRange(u,p),

    activity:ref?.activity||u.activity||activityFor(p),

    keywords:(rel.evidence?.length?rel.evidence.slice(0,4).join(' · '):'')||hits.slice(0,4).join(' · ')||(ref.focus||u.focus||[p.cat,p.sub].filter(Boolean).join(' · ')),

  // 추천 장소 클릭 시 팝업으로 기본 정보를 먼저 표시합니다.
  $i('mbdy').innerHTML=`
    ${p.img?`<img class="mimg" src="${p.img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="mnimg" style="display:none"><div class="mnimg-ic">${cm?.ic||'📍'}</div><div class="mnimg-tx">이미지 준비 중</div></div>`:`<div class="mnimg"><div class="mnimg-ic">${cm?.ic||'📍'}</div><div class="mnimg-tx">이미지 준비 중</div></div>`}
    <div class="minfo">
      <div class="ib" style="background:var(--g50);">
        <div class="ibl">장소 정보</div>
        <strong>${esc(p.title)}</strong><br>
        📍 ${esc(p.addr1)}<br>
        🏫 ${esc(A.sc?.SCHUL_NM||'선택한 학교')}에서 <strong>${p.dist}km</strong><br>
        ${p.cat?`🏷️ ${cm?.ic||''} ${esc(p.cat)}${p.sub?' › '+esc(p.sub):''}`:''}<br>
        <a class="nlink" href="https://map.naver.com/v5/search/${encodeURIComponent(p.title)}" target="_blank">🗺️ 네이버 지도에서 보기 →</a>
      </div>
      <div class="m-actions">
        <button class="mact primary" id="cardnewsBtn" onclick="toggleCardNews()">카드뉴스 보기</button>
      </div>
      <div class="cardnews" id="m-cardnews" hidden>${cardNewsHtml(p,u,'',p.img)}</div>
      <div class="ib" style="background:var(--g50);" id="m-overview">
        <div class="ibl">장소 소개</div>
        <div class="ai-loading"><div class="ai-spin"></div> 정보 불러오는 중...</div>
      </div>
      <div class="ai-box" id="m-ai">${curriculumInsightHtml(p,u,'')}</div>
    </div>`;
  $i('ov').classList.add('on');

  const [overview,img]=await Promise.all([
    fetchDetail(p.id,p.contentTypeId),
    p.img?Promise.resolve(p.img):fetchTourImage(p.id),
  ]);
  if(!p.img&&img){
    p.img=img;
    const media=$i('mbdy').firstElementChild;
    if(media)media.outerHTML=`<img class="mimg" src="${img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="mnimg" style="display:none"><div class="mnimg-ic">${cm?.ic||'📍'}</div><div class="mnimg-tx">이미지 준비 중</div></div>`;
    rnList();
  }
  const ov=cleanText(overview||'');
  const ovEl=$i('m-overview');
  if(ovEl){ovEl.innerHTML=`<div class="ibl">장소 소개</div>${ov?esc(ov.slice(0,420))+(ov.length>420?'...':''):'장소 소개 정보가 없습니다.'}`;}
  const aiEl=$i('m-ai');
  if(aiEl)aiEl.innerHTML=curriculumInsightHtml(p,u,ov);
  const newsEl=$i('m-cardnews');
  if(newsEl)newsEl.innerHTML=cardNewsHtml(p,u,ov,p.img||img);
}
function cm(){$i('ov').classList.remove('on');}
updateResetBtn();
document.addEventListener('click',e=>{if(!e.target.closest('#si')&&!e.target.closest('#dd'))$i('dd').style.display='none';});
</script>
</body>
</html>
