<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경북 체험학습 추천</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --b50:#EFF6FF;--b100:#DBEAFE;--b200:#BFDBFE;--b300:#93C5FD;
  --b400:#60A5FA;--b500:#3B82F6;--b600:#2563EB;--b700:#1D4ED8;--b800:#1E40AF;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;--g800:#1E293B;--g900:#0F172A;
  --bg:#f4f1eb;--green:#1b4332;--green2:#2d6a4f;--mint:#22c55e;--orange:#f4a261;--orange2:#e76f51;--soft:#f8fafc;--shadow:0 10px 30px rgba(0,0,0,.08);
  --lw:320px;--rw:390px;--th:58px;--shell:1120px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--g900);}
body{margin:0;overflow:auto;}
button,input,select{font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* ── 레이아웃 ── */
#app{position:relative;background:var(--bg);}
#app.intro{display:block;min-height:100vh;}
#app.intro #rgt{display:none;}
#app.intro #mapw{display:none;}
#app.intro #lft{position:relative;width:min(var(--shell),calc(100% - 32px));max-width:none;max-height:none;margin:-18px auto 24px;border:none;border-radius:20px;box-shadow:var(--shadow);}
#app.intro .me{display:none;}
#app.results{height:100vh;overflow:hidden;display:grid;grid-template-rows:var(--th) 1fr;grid-template-columns:1fr;grid-template-areas:"top" "map";}
#app.results #mapw{position:absolute;inset:0;z-index:1;width:100%;height:100%;overflow:hidden;}
#app.results #map{height:100vh;min-height:0;}
#app.results .leaflet-top{top:var(--th);}
#app.results #lft{display:none;}

/* ── 탑바 / 히어로 ── */
#top{grid-area:top;background:var(--green);color:#fff;display:flex;align-items:center;padding:0 16px;gap:14px;z-index:100;}
#app.intro #top{min-height:178px;background:linear-gradient(135deg,var(--green),var(--green2));align-items:flex-start;padding:28px 20px 40px;}
#app.intro #top .brand{width:min(var(--shell),100%);margin:0 auto;align-items:flex-start;}
#app.intro .top-r{display:none;}
#app.results #top{height:var(--th);box-shadow:0 2px 12px rgba(15,23,42,.18);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-ic{width:32px;height:32px;background:rgba(255,255,255,.14);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.brand-tx{font-size:15px;font-weight:800;color:inherit;letter-spacing:-.3px;}
.brand-sb{font-size:11px;color:rgba(255,255,255,.76);margin-top:1px;}
#app.intro .brand-ic{width:42px;height:42px;border-radius:12px;font-size:22px;background:rgba(255,255,255,.16);}
#app.intro .brand-tx{font-size:30px;font-weight:900;line-height:1.18;letter-spacing:0;}
#app.intro .brand-sb{font-size:13px;margin-top:10px;line-height:1.7;color:rgba(255,255,255,.84);}
.top-r{margin-left:auto;display:flex;gap:6px;}
.tbadge{font-size:11px;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.22);padding:3px 10px;border-radius:20px;font-weight:600;}
.result-only{display:none;}
#app.results .intro-only{display:none;}
#app.results .result-only{display:inline-flex;}
.topBtn{border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:800;align-items:center;gap:4px;}
.topBtn:hover{background:rgba(255,255,255,.24);}

/* ── 지도 위 검색 패널 ── */
#lft{grid-area:map;align-self:start;justify-self:start;width:var(--lw);max-width:calc(100% - 28px);max-height:calc(100% - 28px);margin:14px;background:#fff;border:1px solid var(--g200);border-radius:12px;box-shadow:0 12px 36px rgba(15,23,42,.14);display:flex;flex-direction:column;overflow:hidden;z-index:450;transition:width .22s ease,box-shadow .22s ease;}
.lbody{flex:1;overflow-y:auto;padding:20px;}
.lbody::-webkit-scrollbar{width:3px;}
.lbody::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}
.lfoot{padding:12px 16px;border-top:1px solid var(--g100);}
.foot-actions{display:grid;grid-template-columns:minmax(0,1fr) 80px;gap:8px;align-items:stretch;}

.sec{margin-bottom:20px;}
.slbl{font-size:15px;font-weight:800;color:var(--green);letter-spacing:0;text-transform:none;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--g100);}

input[type=text]{width:100%;padding:14px 12px;border:1px solid #d1d5db;border-radius:12px;font-size:14px;outline:none;background:#fff;color:var(--g800);transition:all .15s;}
input[type=text]:focus{border-color:var(--b400);background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.08);}
input::placeholder{color:var(--g300);}
.srow{display:flex;gap:6px;}
.srow input{flex:1;}
.sbtn{padding:0 16px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:13px;font-weight:800;transition:background .15s;flex-shrink:0;}
.sbtn:hover{background:var(--green2);}
.sbtn:disabled{background:var(--g300);}

#dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--g200);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:500;max-height:240px;overflow-y:auto;display:none;}
.ddi{width:100%;padding:9px 12px;border:none;background:transparent;text-align:left;cursor:pointer;border-bottom:1px solid var(--g100);display:flex;flex-direction:column;gap:2px;transition:background .1s;}
.ddi:last-child{border-bottom:none;}
.ddi:hover{background:var(--b50);}
.dn{font-size:13px;font-weight:600;color:var(--g800);}
.ds{font-size:11px;color:var(--g400);}

.st-ok{margin-top:6px;padding:7px 10px;background:var(--b50);border:1px solid var(--b200);border-radius:7px;font-size:12px;color:var(--b700);display:flex;align-items:center;justify-content:space-between;}
.st-err{margin-top:6px;padding:7px 10px;background:#FEF2F2;border:1px solid #FECACA;border-radius:7px;font-size:12px;color:#DC2626;}
.st-inf{margin-top:6px;padding:7px 10px;background:var(--g50);border:1px solid var(--g200);border-radius:7px;font-size:12px;color:var(--g500);}
.xb{border:none;background:none;color:var(--g400);font-size:12px;padding:0;cursor:pointer;}

.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:9px 18px;border:1px solid #86efac;border-radius:999px;font-size:13px;font-weight:800;cursor:pointer;background:#fff;color:#166534;transition:all .15s;}
.chip.on{background:var(--mint);color:#fff;border-color:var(--mint);}
.chip:hover:not(.on){background:#f0fdf4;border-color:var(--mint);color:#166534;}

.ubt{width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:14px;background:#fff;text-align:left;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.ubt:hover{border-color:var(--mint);background:#f0fdf4;}
.ubt.on{background:#f0fdf4;color:var(--g900);border-color:var(--mint);}
.ubt .ic{font-size:17px;flex-shrink:0;margin-top:1px;}
.ubt .nm{font-size:13px;font-weight:700;}
.ubt .tm{font-size:11px;opacity:.6;margin-top:3px;line-height:1.4;}
.unit-info{display:none;margin-top:10px;padding:13px 14px;border:1px solid var(--b200);border-radius:14px;background:#f8fbff;color:var(--g700);font-size:12px;line-height:1.6;}
.unit-info.show{display:block;}
.unit-info-hd{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;font-weight:900;color:var(--b700);}
.unit-info-title{font-size:13px;font-weight:900;color:var(--g900);margin-bottom:4px;}
.unit-info-focus{margin-bottom:8px;color:var(--g600);}
.unit-standard-list{display:grid;gap:7px;}
.unit-standard-item{padding-top:7px;border-top:1px solid #dbeafe;}
.unit-standard-name{font-weight:800;color:var(--g800);margin-bottom:2px;}
.unit-standard-text{color:var(--g700);}
.unit-standard-source{margin-top:8px;font-size:11px;color:var(--g400);}
.source-note{margin-top:4px;padding:12px;border-radius:12px;background:#f8fafc;color:#64748b;font-size:12px;line-height:1.65;border:1px solid #e5e7eb;}
.raw-note{margin-top:9px;padding-top:8px;border-top:1px solid var(--g200);font-size:11px;color:var(--g500);line-height:1.55;}

.goBtn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;font-size:16px;font-weight:900;transition:all .15s;}
.goBtn:hover:not(:disabled){filter:brightness(.96);}
.goBtn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed;}
.resetBtn{border:1px solid var(--g200);border-radius:9px;background:#fff;color:var(--g600);font-size:13px;font-weight:700;transition:all .15s;}
.resetBtn:hover:not(:disabled){border-color:var(--b300);background:var(--b50);color:var(--b700);}
.resetBtn:disabled{color:var(--g300);background:var(--g50);cursor:not-allowed;}

/* ── 지도 ── */
#mapw{grid-area:map;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
.me{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--g50);color:var(--g400);pointer-events:none;transition:opacity .3s;z-index:1;}
.me.hide{opacity:0;pointer-events:none;}
.me-ic{font-size:44px;}
.me-t{font-size:14px;font-weight:600;color:var(--g400);}
.me-s{font-size:12px;color:var(--g300);text-align:center;line-height:1.6;}

/* ── 오른쪽 추천 장소 ── */
#rgt{grid-area:rgt;background:#fff;border-left:1px solid var(--g200);display:flex;flex-direction:column;overflow:hidden;}
#app.results #rgt{position:absolute;top:calc(var(--th) + 16px);right:16px;bottom:16px;width:min(var(--rw),calc(100vw - 32px));border:none;border-radius:20px;box-shadow:0 18px 48px rgba(15,23,42,.22);z-index:30;}

.rhead{padding:16px 16px 0;flex-shrink:0;}
.rhead-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rhead-title{font-size:15px;font-weight:900;color:var(--green);}
.rhead-cnt{font-size:11px;color:var(--g400);}

/* 대분류 탭 */
.ctabs{display:flex;gap:4px;overflow-x:auto;padding:0 0 10px 0;flex-shrink:0;}
.ctabs::-webkit-scrollbar{height:3px;}
.ctabs::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}
.ctab{padding:6px 12px;border:1px solid var(--g200);border-radius:20px;font-size:12px;font-weight:600;color:var(--g500);background:var(--g50);white-space:nowrap;flex-shrink:0;transition:all .15s;}
.ctab.on{background:var(--b600);color:#fff;border-color:var(--b600);}
.ctab:hover:not(.on){background:var(--b50);border-color:var(--b300);color:var(--b700);}

/* 소분류 */
.sbar{padding:0 14px 10px;display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--g100);flex-shrink:0;}
.sbar::-webkit-scrollbar{height:3px;}
.sbar::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}
.sch{padding:5px 11px;border:1px solid var(--g200);border-radius:20px;font-size:12px;font-weight:500;color:var(--g500);background:#fff;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.sch.on{background:var(--b100);color:var(--b700);border-color:var(--b300);}
.sch:hover:not(.on){background:var(--g50);}

/* 정렬 */
.sortbar{padding:8px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--g100);flex-shrink:0;}
.sortlbl{font-size:12px;color:var(--g400);font-weight:500;}
.sortbtn{padding:4px 11px;border:1px solid var(--g200);border-radius:20px;font-size:12px;font-weight:500;color:var(--g500);background:#fff;transition:all .15s;}
.sortbtn.on{background:var(--g800);color:#fff;border-color:var(--g800);}

/* 장소 리스트 */
#rlist{flex:1;overflow-y:auto;padding:10px 10px 16px;}
#rlist::-webkit-scrollbar{width:3px;}
#rlist::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}

/* 장소 리스트 카드 */
.pc{border-radius:9px;border:1px solid var(--g100);margin-bottom:7px;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .15s;background:#fff;display:grid;grid-template-columns:32px minmax(0,1fr);gap:10px;padding:10px 11px;}
.pc:hover{box-shadow:0 4px 12px rgba(59,130,246,.1);border-color:var(--b200);transform:translateY(-1px);}
.pc-ico{width:32px;height:32px;border-radius:8px;background:var(--b50);color:var(--b700);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;line-height:1;}
.pc-img{width:100%;height:110px;object-fit:cover;display:block;background:var(--g100);}
.pc-nimg{width:100%;height:110px;background:linear-gradient(135deg,var(--b50),var(--g100));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.pc-nimg-ic{font-size:26px;opacity:.35;}
.pc-nimg-tx{font-size:11px;color:var(--g400);font-weight:500;}
.pc-body{padding:0;min-width:0;}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:4px;}
.pc-nm{font-size:13px;font-weight:700;color:var(--g800);line-height:1.35;flex:1;min-width:0;}
.votes{display:flex;gap:3px;flex-shrink:0;}
.vb{display:flex;align-items:center;gap:2px;padding:3px 7px;border-radius:20px;border:1px solid var(--g200);font-size:11px;font-weight:600;color:var(--g500);background:#fff;transition:all .15s;}
.vb:hover{border-color:var(--b300);}
.vb.up.on{background:var(--b50);color:var(--b600);border-color:var(--b300);}
.vb.dn.on{background:#FEF2F2;color:#DC2626;border-color:#FECACA;}
.pc-addr{font-size:11px;color:var(--g400);margin-bottom:6px;line-height:1.45;}
.pc-tags{display:flex;gap:3px;flex-wrap:wrap;}
.ptag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.pb{background:var(--b50);color:var(--b600);}
.pg{background:var(--g100);color:var(--g500);}

/* 빈 / 스켈레톤 */
.rempty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--g300);text-align:center;gap:8px;}
.rempty-ic{font-size:36px;}
.rempty-t{font-size:13px;font-weight:600;color:var(--g400);}
.rempty-s{font-size:12px;color:var(--g300);line-height:1.5;}
.sk-card{border-radius:9px;border:1px solid var(--g100);overflow:hidden;margin-bottom:7px;padding:10px 11px;}
.sk{background:linear-gradient(90deg,var(--g100),var(--g50),var(--g100));background-size:200% 100%;animation:sk 1.5s ease-in-out infinite;}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-h{height:14px;width:74%;border-radius:4px;margin-bottom:8px;}
.sk-b{padding:0;}
.sk-l{height:12px;border-radius:4px;margin-bottom:7px;}

/* 모달 */
#ov{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
#ov.on{display:flex;}
#mod{background:#fff;border-radius:16px;width:100%;max-width:720px;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden;}
#mhd{padding:16px 18px;background:var(--b600);color:#fff;display:flex;align-items:flex-start;gap:10px;flex-shrink:0;}
#mttl{font-size:16px;font-weight:800;flex:1;line-height:1.35;}
#mcls{border:none;background:rgba(255,255,255,.2);color:#fff;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;flex-shrink:0;}
#mbdy{overflow-y:auto;flex:1;}
#mbdy::-webkit-scrollbar{width:4px;}
#mbdy::-webkit-scrollbar-thumb{background:var(--g200);border-radius:4px;}
.mimg{width:100%;height:clamp(260px,38vh,340px);object-fit:cover;display:block;}
.mnimg{width:100%;height:clamp(220px,32vh,300px);background:linear-gradient(135deg,var(--b50),var(--g100));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:18px;}
.mnimg-ic{font-size:40px;opacity:.3;}
.mnimg-tx{font-size:12px;color:var(--g400);}
.media-links{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
.media-link{border:1px solid var(--g200);background:#fff;color:var(--b600);border-radius:999px;padding:5px 9px;font-size:11px;font-weight:800;text-decoration:none;}
.media-link:hover{border-color:var(--b300);background:var(--b50);}
.minfo{padding:14px 18px 18px;}
.ib{padding:12px 14px;border-radius:9px;margin-bottom:9px;font-size:13px;line-height:1.65;}
.ibl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;color:var(--g500);}
.place-meta{display:grid;gap:4px;color:var(--g700);}
.place-meta strong{color:var(--g900);}
.link-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;}
.nlink{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--b600);font-weight:700;text-decoration:none;margin-top:0;}
.nlink:hover{text-decoration:underline;}
.m-actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 9px;}
.mact{border:1px solid var(--g200);background:#fff;color:var(--g600);border-radius:8px;padding:9px 12px;font-size:12px;font-weight:700;transition:all .15s;}
.mact:hover{border-color:var(--b300);background:var(--b50);color:var(--b700);}
.mact.primary{background:var(--g900);border-color:var(--g900);color:#fff;}
.mact.primary:hover{background:var(--b700);border-color:var(--b700);color:#fff;}
/* AI 섹션 */
.ai-box{padding:12px 14px;border-radius:10px;margin-bottom:9px;background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border:1px solid var(--b200);}
.ai-hd{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.ai-ic{font-size:16px;}
.ai-ttl{font-size:12px;font-weight:700;color:var(--b700);}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.ai-chip{background:#fff;border:1px solid var(--b100);border-radius:8px;padding:9px 10px;font-size:12px;line-height:1.55;color:var(--g700);}
.ai-chip strong{display:block;font-size:11px;color:var(--b700);margin-bottom:3px;}
.ai-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g400);}
.ai-spin{width:14px;height:14px;border:2px solid var(--b200);border-top-color:var(--b500);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-row{margin-bottom:8px;}
.ai-row-lbl{font-size:11px;font-weight:700;color:var(--b600);margin-bottom:4px;}
.ai-row-tx{font-size:13px;color:var(--g700);line-height:1.62;}
.ai-compact{display:grid;gap:8px;}
.ai-err{font-size:12px;color:#DC2626;}
.cardnews{margin:10px 0 9px;padding:12px;border:1px solid var(--g200);border-radius:12px;background:var(--g50);}
.cardnews[hidden]{display:none;}
.news-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.news-card{min-height:228px;border-radius:10px;border:1px solid var(--g200);background:#fff;overflow:hidden;display:flex;flex-direction:column;}
.news-photo{height:112px;background:linear-gradient(135deg,var(--b50),var(--g100));position:relative;overflow:hidden;}
.news-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.news-placeholder{height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--g300);}
.news-body{padding:12px;display:flex;flex-direction:column;gap:7px;flex:1;}
.news-kicker{font-size:10px;font-weight:800;color:var(--b600);letter-spacing:.5px;text-transform:uppercase;}

function uniq(arr){return Array.from(new Set((arr||[]).filter(Boolean)));}
function mergeSocialUnits(grade,units){
  const groups=[];
  units.forEach(u=>{
    let g=groups.find(x=>x.unit===u.unit);
    if(!g){g={unit:u.unit,items:[]};groups.push(g);}
    g.items.push(u);
  });
  return groups.map((g,i)=>{
    const items=g.items.map(x=>({...x,source:x.source||TEXTBOOK_SOURCE}));
    return {
      id:`${grade}s${i+1}`,
      unit:g.unit,
      name:g.unit,
      displayName:g.unit,
      ic:items[0]?.ic||'📘',
      terms:uniq(items.flatMap(x=>x.terms||[])),
      searchTerms:uniq(items.flatMap(x=>x.searchTerms||[])),
      placeTypes:uniq(items.flatMap(x=>x.placeTypes||[])),
      standard:`${g.unit} 단원에서 다루는 ${items.map(x=>x.name).join(', ')} 내용을 경북 지역 자원과 연결해 조사한다.`,
      activity:'장소 특성에 따라 단원 안의 관련 주제와 차시를 연결해 답사·조사 활동을 구성합니다.',
      focus:items.map(x=>x.name).join(' · '),
      subtopics:items,
      source:uniq(items.map(x=>x.source)).join(' / '),
    };
  });
}
Object.entries(SOCIAL_CURRICULUM).forEach(([grade,units])=>{CUR[grade].사회=mergeSocialUnits(grade,units);});

function cleanText(v=''){return String(v).replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();}
function unitLabel(u){return u?.displayName||u?.unit||u?.name||'';}
function unitMeta(u){return u?.subtopics?.length?'단원 전체 선택 · 결과에서 장소별 세부 주제 자동 연결':(u?.focus||u?.terms?.slice(0,4).join(' · ')||'');}
function unitStandardRows(u){
  if(!u)return [];
  const rows=(u.subtopics?.length?u.subtopics:[u]).map(t=>({
    name:t.name||unitLabel(t),
    lesson:t.lesson||'',
    standard:t.standard||standardFor(t,null),
  })).filter(x=>x.standard);
  return rows.length?rows:[{name:unitLabel(u),lesson:u.lesson||'',standard:unitMeta(u)}];
}
function unitInfoHtml(u){
  if(!u)return '';
  const rows=unitStandardRows(u);
  const shown=rows.slice(0,3);
  const more=rows.length>shown.length?`<div class="unit-standard-item"><div class="unit-standard-text">그 밖의 세부 주제 ${rows.length-shown.length}개 포함</div></div>`:'';
  return `
    <div class="unit-info-hd"><span>📘</span><span>이 단원의 성취기준</span></div>
    <div class="unit-info-title">${esc(unitLabel(u))}</div>
    <div class="unit-info-focus">핵심: ${esc(u.focus||unitMeta(u))}</div>
    <div class="unit-standard-list">
      ${shown.map(r=>`
        <div class="unit-standard-item">
          <div class="unit-standard-name">${esc([r.lesson,r.name].filter(Boolean).join(' · '))}</div>
          <div class="unit-standard-text">${esc(r.standard)}</div>
        </div>`).join('')}
      ${more}
    </div>
    ${u.source?`<div class="unit-standard-source">기준: ${esc(u.source)}</div>`:''}
  `;
}

function timeoutSignal(ms){
  if(window.AbortSignal?.timeout)return AbortSignal.timeout(ms);
  const controller=new AbortController();
  setTimeout(()=>controller.abort(),ms);
  return controller.signal;
}
async function apiJson(url,timeout=12000){
  try{
    const r=await fetch(url,{signal:timeoutSignal(timeout)});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    return await r.json();
  }catch(e){
    const r=await fetch(`${PX}${encodeURIComponent(url)}`,{signal:timeoutSignal(timeout)});
    if(!r.ok)throw new Error(`Proxy HTTP ${r.status}`);
    return await r.json();
  }
}
async function apiText(url,timeout=12000){
  try{
    const r=await fetch(url,{signal:timeoutSignal(timeout)});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    return await r.text();
  }catch(e){
    const r=await fetch(`${PX}${encodeURIComponent(url)}`,{signal:timeoutSignal(timeout)});
    if(!r.ok)throw new Error(`Proxy HTTP ${r.status}`);
    return await r.text();
  }
}
async function apiXml(url,timeout=12000){
  const text=await apiText(url,timeout);
  const doc=new DOMParser().parseFromString(text,'application/xml');
  if(doc.querySelector('parsererror'))throw new Error('XML 파싱 실패');
  return doc;
}
function xmlVal(el,name){
  return cleanText(el?.querySelector(name)?.textContent||'');
}
function xmlItems(doc){
  return Array.from(doc.querySelectorAll('item')).map(item=>{
    const out={};
    Array.from(item.children).forEach(ch=>{out[ch.tagName]=cleanText(ch.textContent);});
    return out;
  });
}
function kmd(la1,lo1,la2,lo2){const R=6371,r=x=>x*Math.PI/180;const a=Math.sin(r(la2-la1)/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(lo2-lo1)/2)**2;return+(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);}

}

async function doSrc(){
  const u=unit();if(!u)return;
  const btn=$i('goBtn');
  btn.disabled=true;btn.textContent='체험지 탐색 중...';
  A.searched=true;setSearchMode(true);updateResetBtn();
  $i('me').classList.add('hide');
  $i('rlist').innerHTML=[1,2,3,4,5].map(()=>`<div class="sk-card"><div class="sk sk-h"></div><div class="sk-b"><div class="sk sk-l" style="width:70%"></div><div class="sk sk-l" style="width:50%"></div><div class="sk sk-l" style="width:40%;height:10px"></div></div></div>`).join('');
  try{
    const ctr=A.loc||GBK;
    if(typeof L!=='undefined')initMap(ctr);
    const terms=Array.from(new Set([...(u.searchTerms||[]),...(u.terms||[]).slice(0,8)]));
    const local=schoolSigungu();
    const [localBatches,nearbyBatches,keywordBatches,heritageBatch,memorialBatch]=await Promise.all([
      local?fetchLocalArea(local.code):Promise.resolve([]),
      fetchNearby(ctr),
      Promise.all(terms.map(t=>ft(t))),
      fetchHeritageCandidates(u),
      fetchMemorialCandidates(u),
    ]);
    const additionalBatch=fetchAdditionalPublicCandidates(u,ctr,local);
    const rawResults=[...localBatches.flat(),...nearbyBatches.flat(),...keywordBatches.flat(),...heritageBatch,...memorialBatch,...additionalBatch];
    if(!rawResults.length)throw new Error('공공데이터 API에서 장소 데이터를 받지 못했습니다. 네트워크 또는 API 응답을 확인해주세요.');
    const places=dedupePlaces(rawResults.map(p=>buildAnyPlace(p,ctr,u,local)).filter(Boolean),u)
      .filter(p=>p.score>0)
      .sort((a,b)=>b.score-a.score||a.dist-b.dist);
    A.all=await hydrateImages(places);

    A.cat='전체';A.sub='전체';A.sort='score';
    document.querySelectorAll('.ctab').forEach(el=>el.classList.toggle('on',el.textContent.trim()==='전체'));
    document.querySelectorAll('.sortbtn').forEach(el=>el.classList.toggle('on',el.getAttribute('onclick').includes("'score'")));
    rnSub();rnList();addMk();
    window._pm=Object.fromEntries(A.all.map(p=>[p.id,p]));
  }catch(e){
    A.all=[];
    $i('rcnt').textContent='';
    $i('rlist').innerHTML=`<div class="rempty"><div class="rempty-ic">⚠️</div><div class="rempty-t">검색을 완료하지 못했습니다</div><div class="rempty-s">${e.message||'잠시 후 다시 시도해주세요.'}</div></div>`;
    console.error(e);
  }finally{
    updateResetBtn();upB();
  }
}

async function ft(term){
  const batches=await Promise.all(EDU_CONTENT_TYPES.map(async type=>{
    const url=`${TOUR}/searchKeyword2?serviceKey=${TK}&keyword=${encodeURIComponent(term)}&areaCode=35&contentTypeId=${type}&numOfRows=20&pageNo=1&MobileOS=ETC&MobileApp=${APP}&_type=json`;
    try{const d=await apiJson(url);const it=d?.response?.body?.items?.item;if(!it)return[];return Array.isArray(it)?it:[it];}catch{return[];}
  }));
  return batches.flat().filter(isUsableTourPlace);
}

function isHeritageUnit(u){
  const text=`${u?.unit||''} ${u?.name||''} ${u?.focus||''} ${(u?.terms||[]).join(' ')} ${(u?.placeTypes||[]).join(' ')}`;
  return /국가유산|문화유산|역사|유적|유물|사적|고분|왕릉|서원|향교|사찰|불국사|석굴암|부석사|봉정사|고택|종택|성곽|읍성|탑|선사|고조선|신라|가야|고려|조선|근대|독립|의병|항일|전쟁/.test(text);
}
function heritageSearchTerms(u){
  const profile=socialUnitProfile(u);
  const raw=[
    ...(u?.searchTerms||[]),
    ...(u?.terms||[]),
    ...(profile?.strong||[]),
    ...(profile?.keywords||[]),
  ];
  const skip=/^(역사|자료|기록|생활|모습|문화|전통|전시|답사|보고서|지역|변화|과거|현재|장소|국가유산|문화유산)$/;
  return uniq(raw.map(x=>cleanText(x)).filter(x=>x.length>=2&&!skip.test(x))).slice(0,14);
}
function heritageListUrl(params={}){
  const q=new URLSearchParams({ccbaCtcd:HERITAGE_CTCD,ccbaCncl:'N',pageUnit:'80',pageIndex:'1',...params});
  return `${KHS}/SearchKindOpenapiList.do?${q.toString()}`;
}
async function fetchHeritageList(params={}){
  try{
    const doc=await apiXml(heritageListUrl(params),14000);
    return xmlItems(doc).filter(isUsableHeritageRecord);
  }catch{return[];}
}
async function fetchHeritageCandidates(u){
  if(!isHeritageUnit(u))return[];
  const terms=heritageSearchTerms(u);
  const codeBatches=HERITAGE_CODES.map(code=>fetchHeritageList({ccbaKdcd:code,pageUnit:'70'}));
  const termBatches=terms.map(term=>fetchHeritageList({ccbaMnm1:term,pageUnit:'60'}));
  const batches=await Promise.all([...codeBatches,...termBatches]);
  return batches.flat();
}
function isUsableHeritageRecord(h){
  const title=h?.ccbaMnm1||'';
  const lat=parseFloat(h?.latitude),lng=parseFloat(h?.longitude);
  if(!title||!Number.isFinite(lat)||!Number.isFinite(lng)||lat===0||lng===0)return false;
  if(h?.ccbaCncl==='Y')return false;
  const text=cleanText(`${title} ${h?.ccmaName||''} ${h?.ccsiName||''}`).toLowerCase();
  return !/음식점|식당|맛집|카페|호텔|모텔|펜션|리조트|숙박|상점|매점/.test(text);
}
function heritageSub(h){
  const text=cleanText(`${h?.ccbaMnm1||''} ${h?.ccmaName||''} ${h?.gcodeName||''} ${h?.bcodeName||''} ${h?.mcodeName||''}`).toLowerCase();
  if(/서원|향교/.test(text))return '서원·향교';
  if(/고분|왕릉|능/.test(text))return '왕릉·고분';
  if(/성곽|읍성|산성|성지/.test(text))return '성곽·읍성';
  if(/고택|종택|가옥|민속|마을/.test(text))return '종택·고택';
  if(/사찰|절|불교|불전|석탑|전탑|석등|불상|사지|불국사|석굴암|부석사|봉정사/.test(text))return '사찰·불교문화';
  return '유적·사적지';
}
function fetchAdditionalPublicCandidates(u,ctr,local){
  const rows=Array.isArray(window.ADDITIONAL_PUBLIC_PLACES)?window.ADDITIONAL_PUBLIC_PLACES:[];
  return rows.map(r=>buildAdditionalPublicPlace(r,ctr,u,local)).filter(Boolean);
}
function hasContextualMemorialEvidence(text=''){
  const t=cleanText(text).toLowerCase().replace(/평화시장/g,' ');
  if(/순국|열사|전몰|현충시설/.test(t))return true;
  return /충혼|위령|추모|기념비|기념탑/.test(t)&&/독립|의병|항일|일제|식민|광복|3·1|3\.1|6\.25|6·25|전쟁|호국|국가수호|전몰|순국|열사|현충|전적|전투/.test(t);
}
function additionalCategory(cat='',sourceType='',text=''){
  if(/남자현|독립운동|항일|의병|일제|식민|호국|전쟁|전적|국가수호|6\.25|6·25|장사상륙|다부동/.test(text)||hasContextualMemorialEvidence(text))return '현충·근현대사';
  if(cat==='관광명소'){
    if(/독립|의병|항일|전쟁|호국|6\.25|6·25|근대|민주/.test(text))return '현충·근현대사';
    if(/유적|유물|사적|고분|왕릉|서원|향교|사찰|문화유산/.test(text))return '문화유산';
    if(/생태|자연|지질|동굴|해안|산|하천|호수|숲/.test(text))return '자연·생태';
  }
  if(sourceType==='museumArt'&&/과학관|천문|자연사|과학/.test(text))return '과학체험';
  return cat||'관광명소';
}
const PLACE_TITLE_ALIASES=[
  {title:'왕산공원',area:'상주시',display:'왕산역사공원',note:'네이버 지도 표기와 공원 세부 분류를 반영한 화면 표시명'},
];
function applyPlaceCuration(p){
  if(!p)return p;
  const alias=PLACE_TITLE_ALIASES.find(a=>normPlaceName(a.title)===normPlaceName(p.title)&&areaName(p.addr1)===a.area);
  if(alias){
    p.originalTitle=p.originalTitle||p.title;
    p.title=alias.display;
    p.curationNote=alias.note;
    p.sourceMeta=uniq([p.sourceMeta,`원자료명 ${p.originalTitle}`].filter(Boolean)).join(' · ');
  }
  return p;

function normPlaceName(name=''){

}
function placeDedupeKey(p){
  return `${normPlaceName(p.title)}|${areaName(p.addr1)}`;
}
function mergeDuplicatePlace(a,b){
  const preferB=b.sourceType==='heritage'&&a.sourceType!=='heritage';
  const keep=preferB?b:a;
  const other=preferB?a:b;
  keep.score=Math.max(keep.score||0,other.score||0);
  keep.img=keep.img||other.img||'';
  keep.sourceName=uniq([keep.sourceName,other.sourceName].filter(Boolean)).join(' + ');
  keep.sourceMeta=uniq([keep.sourceMeta,other.sourceMeta,other.contentTypeName,other.sub].filter(Boolean)).join(' · ');
  if(other.sourceType==='tour')keep.tourContentId=other.id;
  if(other.sourceType==='heritage'&&!keep.heritage)keep.heritage=other.heritage;
  if(other.sourceType==='memorial'&&!keep.memorial)keep.memorial=other.memorial;
  if(other.publicData&&!keep.publicData)keep.publicData=other.publicData;
  if(other.sourceUrl&&!keep.sourceUrl)keep.sourceUrl=other.sourceUrl;
  return keep;
}
function dedupePlaces(places,u){
  const byKey=new Map();
  places.forEach(p=>{
    const key=placeDedupeKey(p);
    const cur=byKey.get(key);
    byKey.set(key,cur?mergeDuplicatePlace(cur,p):p);
  });
  return Array.from(byKey.values());
}

function pickProfileTopic(profile,u,text){
  if(!profile||!u?.subtopics?.length)return null;
  const hit=(profile.topicByText||[]).find(x=>x.re.test(text));
  if(!hit)return null;
  return u.subtopics.find(t=>hit.topic.test(t.name))||null;
}
function curriculumRelevance(p,u,overview=''){
  const text=curriculumEvidenceText(p,overview);
  const profile=socialUnitProfile(u);
  const eras=historyEraTags(text);
  let bestTopic=null,bestScore=0;
  (u?.subtopics||[]).forEach(t=>{
    const score=subtopicScore(t,text);
    if(score>bestScore){bestScore=score;bestTopic=t;}
  });
  if(profile&&isWorldGeographyUnit(u)&&!hasWorldGeographyEvidence(text)){
    return {profile,score:0,min:profile.min,evidence:[],topic:null,direct:false,eras,blocked:false,missingEra:false};
  }
  if(!profile){
    const hits=keywordHits(text,u?.terms||[]);
    return {profile:null,score:hits.length*18+bestScore,min:18,evidence:hits,topic:bestTopic,direct:hits.length>0||bestScore>0};
  }
  const strong=keywordHits(text,profile.strong);
  const weak=keywordHits(text,profile.keywords);
  const codeHit=profile.codeGroup&&(TOUR_CODE_GROUPS[profile.codeGroup]||[]).includes(p?.cat3);
  const broadNature=profile.codeGroup==='nature'&&p?.cat1==='A01';
  let score=bestScore+strong.length*32+weak.length*12;
  if(codeHit||broadNature)score+=34;
  if(profile.requiredEras?.length&&hasEra(eras,profile.requiredEras))score+=36;
  if(profile.requiredEras?.length&&!hasEra(eras,profile.requiredEras))score=0;
  if(profile.blockedEras?.length&&hasEra(eras,profile.blockedEras))score=0;
  if(profile.requiredEras?.length&&genericHistoryOnly(text))score=0;
  if(profile.deny?.test(text)&&!strong.length&&!codeHit&&!broadNature)score=0;
  const topic=bestTopic||pickProfileTopic(profile,u,text);
  const evidence=uniq([...strong,...weak,...eraLabels(eras),codeHit||broadNature?profile.label:'']);
  const blocked=profile.blockedEras?.length&&hasEra(eras,profile.blockedEras);
  const missingEra=profile.requiredEras?.length&&!hasEra(eras,profile.requiredEras);
  return {profile,score,min:profile.min,evidence,topic,direct:score>=profile.min,eras,blocked,missingEra};
}

    if(rel.score<rel.min)return 0;
    const isNearby=p.dist<=8?18:p.dist<=15?12:p.dist<=30?6:0;

  }
  if(/경제|교류|생산|소비|산업화|시장|특산물/.test(unitText)&&/시장|산업|공장|공방|체험관|항구|역|특산|농촌|오일장|포항제철/.test(text))score+=28;
  if(/교통|통신/.test(unitText)&&/철도|역|항구|봉수|우체국|전신|교통|기차/.test(text))score+=30;

  const unitText=cleanText(`${u?.unit||''} ${u?.name||''} ${u?.focus||''} ${(u?.terms||[]).join(' ')} ${(u?.placeTypes||[]).join(' ')}`).toLowerCase();
  const termHits=(u?.terms||[]).filter(k=>keywordMatch(text,k)).length;
  const placeHits=(u?.placeTypes||[]).filter(k=>keywordMatch(text,k)).length;
  const status=p?.publicData?.status||p?.status||'추천후보';
  const cat=p?.cat||'';
  const sourceType=p?.sourceType||'';
  const modernConflictUnit=isModernConflictUnit(u);
  const worldGeographyUnit=isWorldGeographyUnit(u);
  if(worldGeographyUnit&&sourceType==='ruralVillage')return 0;
  if(worldGeographyUnit&&!hasWorldGeographyEvidence(text))return 0;
  if(worldGeographyUnit&&/^(cityPark|nationalParkTrail|forestTrail|ecoTour)$/.test(sourceType))return 0;
  if(worldGeographyUnit&&sourceType==='festival'&&/전년도|종료/.test(status))return 0;
  if(modernConflictUnit&&sourceType==='festival')return 0;
  if(modernConflictUnit&&/^(ruralVillage|ecoTour|nationalParkTrail|forestTrail)$/.test(sourceType))return 0;
  if(modernConflictUnit&&!hasModernConflictEvidence(text))return 0;

  let boost=termHits*14+placeHits*12;
  if(/역사|유적|유물|국가유산|문화유산|고대|고려|조선|생활 모습/.test(unitText)&&/역사|문화|유적|유물|박물관|전시|사적|고분|서원|향교|사찰|신라|가야|고려|조선|근대/.test(text))boost+=52;
  if(/국토|지형|산지|지도|위치|자연|생태|환경|하천|해안|기후/.test(unitText)&&/산지|탐방로|등산로|국립공원|생태|자연|지질|동굴|공원|수변|해안|하천|숲|환경/.test(text))boost+=52;
  if(/경제|생산|소비|촌락|도시|교류|지역문화|생활 모습/.test(unitText)&&/농촌|어촌|체험|생산|소비|수확|갯벌|어업|마을|특산|시장/.test(text))boost+=52;
  if(/문화|풍습|지역 알리기|사회 변화|계절|축제/.test(unitText)&&/축제|문화제|전통|예술|공연|계절|특산|지역/.test(text))boost+=44;
  if(/과학|생태계|환경|날씨|지구|천문|자연사|밤하늘|달|별|자석|소리|기체|산과 염기|산성|염기성|물체와 물질|물체의 운동|힘|무게|속력/.test(unitText)&&/과학|자연사|천문|별|우주|생태|환경|지질|기상|안전|교통|전시|체험/.test(text))boost+=44;
  if(modernConflictUnit&&hasModernConflictEvidence(text))boost+=44;
  if(cat==='박물관·전시'&&/역사|문화|과학|자료|전시|유물|생활/.test(unitText))boost+=24;
  if(cat==='공원·생활환경'&&/위치|지역|공공|주민|지도|환경|생활권|자연|시민/.test(unitText))boost+=20;
  if(cat==='관광명소'&&/국토|지역|지도|문화|역사|자연|환경|생활 모습|지역 알리기/.test(unitText))boost+=18;
  if(sourceType==='ruralVillage'&&/경제|생산|소비|촌락|지역|문화|교류|생활/.test(unitText))boost+=26;
  if(sourceType==='festival'&&/문화|지역|풍습|사회 변화|계절/.test(unitText))boost+=22;
  if((sourceType==='nationalParkTrail'||sourceType==='forestTrail')&&/국토|지형|산지|지도|자연|환경|안전/.test(unitText))boost+=26;
  if(worldGeographyUnit&&hasWorldGeographyEvidence(text))boost+=56;

  if(boost<28&&termHits===0&&placeHits===0)return 0;
  if(/^검수필요/.test(status)&&boost<48)return 0;
  if(cat==='공원·생활환경'&&boost<42)return 0;

  let score=(Number(p?.publicData?.scoreBase)||Number(p?.scoreBase)||45)+boost;
  if(/^검수필요/.test(status))score-=24;
  if(/^보조자료/.test(status))score-=18;
  if(/전년도|종료/.test(status))score-=10;
  if(Number.isFinite(p.dist)&&p.dist<999)score+=p.dist<=8?18:p.dist<=15?12:p.dist<=30?6:0;
  if(local?.code&&p.sigunguCode===local.code)score+=18;
  return Math.max(0,score);
}

async function hydrateImages(places){
  const targets=places.filter(p=>!p.img&&p.sourceType!=='heritage'&&!ADDITIONAL_PUBLIC_SOURCE_TYPES.has(p.sourceType)).slice(0,18);

async function fetchPlaceImage(p){

async function fetchDetail(p){
  if(ADDITIONAL_PUBLIC_SOURCE_TYPES.has(p?.sourceType)){
    p.detailSource=p.sourceName||'추가 공공데이터 전처리 자료';
    return p.publicData?.overview||p.publicData?.evidence||p.sourceMeta||'';
  }
  if(p?.sourceType==='memorial'){
    p.detailSource=MPVA_SOURCE;
    return p.memorial?.overview||p.sourceMeta||'';
  }
  if(p?.sourceType==='heritage'){
    const detail=await fetchHeritageDetail(p);
    if(detail.img&&!p.img)p.img=detail.img;
    if(detail.addr1)p.addr1=detail.addr1;
    if(detail.era)p.heritage={...(p.heritage||{}),era:detail.era,classes:detail.classes};
    if(detail.sourceMeta)p.sourceMeta=detail.sourceMeta;
    if(detail.detailSource)p.detailSource=detail.detailSource;
    return detail.overview||p.sourceMeta||'';
  }
  const contentId=p?.tourContentId||p?.id;
  const url=`${TOUR}/detailCommon2?serviceKey=${TK}&contentId=${contentId}&numOfRows=1&pageNo=1&MobileOS=ETC&MobileApp=${APP}&_type=json`;
  try{
    const d=await apiJson(url,10000);
    const item=d?.response?.body?.items?.item;
    const it=Array.isArray(item)?item[0]:item;
    return it?.overview||'';
  }catch{return '';}
}
async function fetchHeritageDetail(p){
  const h=p?.heritage;
  if(!h?.ccbaKdcd||!h?.ccbaAsno||!h?.ccbaCtcd)return{overview:p?.sourceMeta||'',img:p?.img||''};
  const url=`${KHS}/SearchKindOpenapiDt.do?ccbaKdcd=${encodeURIComponent(h.ccbaKdcd)}&ccbaAsno=${encodeURIComponent(h.ccbaAsno)}&ccbaCtcd=${encodeURIComponent(h.ccbaCtcd)}`;
  try{
    const doc=await apiXml(url,12000);
    const item=doc.querySelector('item');
    const era=xmlVal(item,'ccceName');
    const classes=uniq([xmlVal(item,'gcodeName'),xmlVal(item,'bcodeName'),xmlVal(item,'mcodeName'),xmlVal(item,'scodeName')]).join(' · ');
    const addr=xmlVal(item,'ccbaLcad')||p.addr1;
    const sourceMeta=uniq([xmlVal(item,'ccmaName')||p.contentTypeName,era,classes,xmlVal(item,'ccbaAsdt')?`지정일 ${xmlVal(item,'ccbaAsdt')}`:'']).join(' · ');
    return {
      overview:xmlVal(item,'content'),
      img:xmlVal(item,'imageUrl'),
      addr1:addr,
      era,
      classes,
      sourceMeta:sourceMeta||p.sourceMeta,
      detailSource:HERITAGE_DETAIL_SOURCE,
    };
  }catch{
    return{overview:p?.sourceMeta||'',img:p?.img||''};
  }
}

    if(r.blocked)return `장소의 시대·주제가 선택 단원과 맞지 않습니다. 감지된 주제는 ${eraLabels(r.eras).join(', ')}이며, 이 단원은 ${r.profile?.label||'선택 단원'} 범위만 추천합니다.`;
    if(r.missingEra)return `장소명과 소개 정보에서 이 단원에 필요한 시대 근거가 확인되지 않습니다. 일반적인 유적·유물 표현만으로는 추천하지 않습니다.`;
    if(r.score<r.min)return '현재 장소명과 소개 정보만으로는 선택한 단원과 직접 연결할 근거가 부족합니다. 이 장소는 추천 결과에서 제외하는 것이 적절합니다.';
    const unit=u.unit||u.name||'선택 단원';
    const topic=ref?.name||unit;
    const ev=(r.evidence?.length?r.evidence:hits).filter(Boolean).slice(0,3).join(', ');
    const evidence=ev||'장소의 핵심 특징';
    if(/우리나라 국토 여행/.test(unit)){
      if(/독도/.test(topic))return `${evidence} 근거가 있어 독도의 위치, 해양 환경, 영토 가치 탐구와 연결됩니다. 문화시설 일반이 아니라 독도·울릉·해안 자원일 때만 이 단원에 추천됩니다.`;
      return `${evidence} 근거가 있어 산지·하천·해안 지형의 분포와 특징을 실제 경북 장소에서 관찰하는 활동으로 연결됩니다.`;
    }
    if(/우리나라 지리 탐구|지도로 만나는 우리 지역|다양한 환경과 삶의 모습/.test(unit)){

    }
    if(/경제활동과 지역 간 교류/.test(unit)){
      return `${evidence} 근거가 있어 생산·소비·교류가 실제 지역에서 어떻게 나타나는지 조사하는 활동과 연결됩니다.`;
    }
    if(/유적과 유물로 살펴본 옛 사람들의 생활/.test(unit)){
      if(/고대/.test(topic))return `${evidence} 근거가 있어 [6사04-02]의 역사 기록·유적·유물을 통한 고대 생활 추론과 직접 연결됩니다. 장소 자료는 삼국유사 원문, 한국고대금석문, 유적 해설과 교차 확인하도록 제시합니다.`;
      if(/고려/.test(topic))return `${evidence} 근거가 있어 [6사04-03]의 다양한 역사 자료를 활용한 고려 시대 사회 모습 추론과 연결됩니다. 고려사 원문과 문화유산 해설을 함께 읽는 탐구로 확장할 수 있습니다.`;

    if(/달라지는 시대, 변화하는 생활 모습/.test(unit)){

      return `${evidence} 근거가 있어 [6사05-02]의 조선 후기 사회·문화 변화와 개항기 근대 문물 수용에 따른 생활 변화 이해와 연결됩니다.`;
    }
    if(/식민 통치와 저항, 전쟁이 바꾼 사회와 생활/.test(unit)){
      if(/식민|저항/.test(topic))return `${evidence} 근거가 있어 [6사06-01]의 일제 식민 통치와 저항이 사회와 생활에 미친 영향 이해와 직접 연결됩니다. 국사편찬위원회 일제감시대상인물카드와 함께 지역 인물·사건을 검증할 수 있습니다.`;
      return `${evidence} 근거가 있어 [6사06-02]의 광복과 6·25 전쟁이 사회와 생활에 미친 영향 파악과 연결됩니다.`;
    }
    if(/국가유산|일상에서 만나는 과거|옛날과 오늘날의 생활 모습|평화 통일|민주화와 산업화/.test(unit)){
      return `${evidence} 근거가 있어 장소에 남아 있는 유물, 기록, 국가유산 또는 근현대 변화의 의미를 조사하는 활동과 연결됩니다.`;
    }
    if(/민주주의와 자치|민주주의와 시민 참여|법과 인권/.test(unit)){
      return `${evidence} 근거가 있어 공공기관, 주민 참여, 권리 보호, 안전 등 시민 생활과 제도의 역할을 살펴보는 활동과 연결됩니다.`;
    }
    if(/지구, 대륙 그리고 국가들/.test(unit)){
      return `${evidence} 근거가 있어 지구본·세계지도·위도와 경도 또는 세계 여러 나라의 문화 비교 활동과 연결됩니다. 생산체험이나 일반 지역 체험만 있는 장소는 이 단원 추천에서 제외합니다.`;
    }
    if(/사회 변화와 다양한 문화|지역문제를 해결하고 지역을 알리는 노력/.test(unit)){
      return `${evidence} 근거가 있어 지역 문화, 지역 홍보, 세계와의 연결 또는 사회 변화 사례를 조사하는 활동과 연결됩니다.`;
    }
    return `${evidence} 근거가 ${topic} 학습 흐름과 직접 맞닿아 있어 경북 지역화 수업 자료로 활용할 수 있습니다.`;
  }
  return hits.length
    ? `${hits.slice(0,3).join(', ')} 키워드가 장소 정보와 맞닿아 있어 ${ref?.name||u?.name||'선택 단원'} 학습 흐름과 직접 연결됩니다.`

}
function sourceEvidenceSummary(p,overview=''){
  const evidence=cleanText(p?.publicData?.evidence||p?.sourceMeta||overview||'');
  const picked=[];
  ['공원구분','보유시설','박물관미술관소개','관광지소개','축제내용','체험프로그램'].forEach(key=>{
    const v=evidenceValue(evidence,key);
    if(v)picked.push(`${key}: ${v}`);
  });
  if(!picked.length&&evidence)picked.push(evidence);
  return picked.join(' / ').slice(0,220);
}
function learningGoalFor(p,u,d,overview=''){

function curriculumData(p,u,overview=''){
  if(!u)return null;
  const text=curriculumEvidenceText(p,overview);
  const rel=curriculumRelevance(p,u,overview);
  const matched=matchSubtopic(p,u,overview);
  const ref=matched||u;
  const hits=(ref.terms||u.terms||[]).filter(k=>keywordMatch(text,k));
  const order=(u.id||'').slice(-1);
  return {
    unit:u.unit||`${order}단원`,
    topic:ref&&ref.name!==u.name?ref.name:'단원 전체',
    lesson:ref?.lesson||lessonRange(u,p),
    standard:standardFor(ref,p),
    reason:recommendationReasonFor(p,u,ref,overview,hits,rel),
    activity:ref?.activity||u.activity||activityFor(p),
    direct:directReasonFor(p,u,ref,overview,hits,rel),
    keywords:(rel.evidence?.length?rel.evidence.slice(0,4).join(' · '):'')||hits.slice(0,4).join(' · ')||(ref.focus||u.focus||[p.cat,p.sub].filter(Boolean).join(' · ')),
    matchLabel:rel.profile?`${rel.profile.label} 근거 ${rel.score>=rel.min?'확인':'부족'}`:'핵심어 기반 연결',
    source:uniq([u.source||'앱 내부 교육과정 데이터',p.sourceName?`장소 원자료: ${p.sourceName}`:'',p.detailSource?`상세 원자료: ${p.detailSource}`:''].filter(Boolean)).join(' / '),
    insufficient:!!(rel.profile&&rel.score<rel.min),
    sourceEvidence:sourceEvidenceSummary(p,overview),
  };
}

        <div class="place-meta">
          <strong>${esc(p.title)}</strong>
          <span>📍 ${esc(p.addr1||'위치 검수 필요')} · 학교 기준 ${esc(distLabel(p))}</span>
          <span>${cm?.ic||''} ${esc(p.cat||'분류 없음')}${p.sub?' · '+esc(p.sub):''}${publicStatusLabel(p)?' · '+esc(publicStatusLabel(p)):''}</span>
          ${p.originalTitle?`<span>원자료명: ${esc(p.originalTitle)}</span>`:''}
          ${p.sourceName?`<span>출처: ${esc(p.sourceName)}</span>`:''}
        </div>
        <div class="link-row">
          ${p.sourceUrl?`<a class="nlink" href="${esc(p.sourceUrl)}" target="_blank">공식 출처</a>`:''}
          ${externalPlaceAnchorsHtml(p)}
        </div>
      </div>
      <div class="m-actions">
        <button class="mact primary" id="cardnewsBtn" onclick="toggleCardNews()">카드뉴스 보기</button>
      </div>
      <div class="cardnews" id="m-cardnews" hidden>${cardNewsHtml(p,u,'',p.img)}</div>
      <div class="ib" style="background:var(--g50);" id="m-overview">
        <div class="ibl">장소 소개</div>
        <div class="ai-loading"><div class="ai-spin"></div> 정보 불러오는 중...</div>
      </div>
      <div class="ai-box" id="m-ai">${curriculumInsightHtml(p,u,'')}</div>
    </div>`;
  $i('ov').classList.add('on');

  const overview=await fetchDetail(p);
  const img=p.img||await fetchPlaceImage(p);
  if(!p.img&&img){
    p.img=img;
    const media=$i('mbdy').firstElementChild;
    if(media)media.outerHTML=modalMediaHtml(p,img,cm);
    rnList();
  }
  const ov=cleanText(overview||'');
  const intro=placeOverviewFor(p,u,ov);
  const ovEl=$i('m-overview');
  if(ovEl){
    const rawNote=intro.generated&&ov?`<div class="raw-note">원자료: ${esc(ov.slice(0,160))}${ov.length>160?'...':''}</div>`:'';
    ovEl.innerHTML=`<div class="ibl">${intro.generated?'AI 보조 장소 소개':'장소 소개'}</div>${esc(intro.text.slice(0,430))}${intro.text.length>430?'...':''}${rawNote}`;
  }
  const aiEl=$i('m-ai');
  if(aiEl)aiEl.innerHTML=curriculumInsightHtml(p,u,ov);
  const newsEl=$i('m-cardnews');
  if(newsEl)newsEl.innerHTML=cardNewsHtml(p,u,ov,p.img||img);
}
function cm(){$i('ov').classList.remove('on');}
updateResetBtn();
document.addEventListener('click',e=>{if(!e.target.closest('#si')&&!e.target.closest('#dd'))$i('dd').style.display='none';});
</script>
</body>
</html>
